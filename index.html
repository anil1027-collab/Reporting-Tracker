<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --surface2: #1b1f2b;
    --border: #252a38;
    --accent: #e8c547;
    --accent2: #4ecdc4;
    --danger: #ff4d6d;
    --warn: #ff9f43;
    --muted: #4a5068;
    --text: #e8eaf0;
    --text2: #8890a8;
    --done: #26c97b;
    --inprogress: #4e9eff;
    --pending: #8890a8;
    --delayed: #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 0.85rem; margin-left: 10px; font-family: 'DM Mono', monospace; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #clock {
    font-size: 0.78rem;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .month-nav button:hover { border-color: var(--accent); background: #1e2030; }

  #monthLabel {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
    min-width: 130px;
    text-align: center;
  }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 69px);
    overflow: hidden;
  }

  /* TODAY PANEL */
  .today-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .today-panel h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .today-date-label {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .today-report-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
  }
  .today-report-card:hover { border-color: #333a50; }
  .today-report-card.overdue { border-left: 3px solid var(--danger); }
  .today-report-card.status-done { border-left: 3px solid var(--done); }

  .report-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.3;
  }

  .report-meta {
    font-size: 0.7rem;
    color: var(--text2);
  }

  .status-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .status-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .status-btn[data-status="Pending"]    { background: transparent; border-color: var(--muted); color: var(--text2); }
  .status-btn[data-status="In Progress"]{ background: transparent; border-color: var(--inprogress); color: var(--inprogress); }
  .status-btn[data-status="Done"]       { background: transparent; border-color: var(--done); color: var(--done); }
  .status-btn[data-status="Delayed"]    { background: transparent; border-color: var(--danger); color: var(--danger); }

  .status-btn.active[data-status="Pending"]     { background: var(--muted); color: #fff; }
  .status-btn.active[data-status="In Progress"] { background: var(--inprogress); color: #fff; }
  .status-btn.active[data-status="Done"]        { background: var(--done); color: #fff; }
  .status-btn.active[data-status="Delayed"]     { background: var(--danger); color: #fff; }

  .no-reports-today {
    font-size: 0.8rem;
    color: var(--text2);
    text-align: center;
    padding: 30px 0;
    border: 1px dashed var(--border);
    border-radius: 10px;
    line-height: 1.8;
  }

  /* SUMMARY CHIPS */
  .summary-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .chip-pending    { background: #252a38; color: var(--text2); }
  .chip-inprogress { background: rgba(78,158,255,0.15); color: var(--inprogress); }
  .chip-done       { background: rgba(38,201,123,0.15); color: var(--done); }
  .chip-delayed    { background: rgba(255,77,109,0.15); color: var(--danger); }
  .chip-overdue    { background: rgba(255,77,109,0.2); color: var(--danger); border: 1px solid var(--danger); }

  /* CALENDAR */
  .calendar-panel {
    overflow-y: auto;
    padding: 24px 28px;
    background: var(--bg);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-header {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-align: center;
    padding: 8px 0;
  }

  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 110px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.2s;
    position: relative;
  }
  .day-cell:hover { border-color: #2e3448; }
  .day-cell.empty { background: transparent; border: none; }
  .day-cell.today-cell { border-color: var(--accent); border-width: 2px; }
  .day-cell.today-cell .day-num { color: var(--accent); }

  .day-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1;
    margin-bottom: 4px;
  }

  .cal-report {
    font-size: 0.6rem;
    padding: 3px 6px;
    border-radius: 4px;
    line-height: 1.3;
    cursor: pointer;
    transition: opacity 0.15s;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .cal-report:hover { opacity: 0.8; }

  .cal-report.status-Pending     { background: rgba(72,80,104,0.5); color: #a0a8c0; border-left: 2px solid var(--muted); }
  .cal-report.status-In.Progress { background: rgba(78,158,255,0.15); color: var(--inprogress); border-left: 2px solid var(--inprogress); }
  .cal-report.status-Done        { background: rgba(38,201,123,0.15); color: var(--done); border-left: 2px solid var(--done); }
  .cal-report.status-Delayed     { background: rgba(255,77,109,0.15); color: var(--danger); border-left: 2px solid var(--danger); }
  .cal-report.overdue-cal        { background: rgba(255,77,109,0.2); color: var(--danger); border-left: 2px solid var(--danger); }

  /* TOOLTIP / POPUP */
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.show { display: flex; }
  .popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .popup h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 6px;
  }
  .popup .pmeta { font-size: 0.72rem; color: var(--text2); margin-bottom: 18px; }
  .popup .status-row { margin-bottom: 18px; }
  .popup-close {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    transition: border-color 0.2s;
  }
  .popup-close:hover { border-color: var(--accent); color: var(--text); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.65rem; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 2px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  .section-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    font-weight: 500;
    margin-top: 8px;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">REPORTRADAR <span>/ multi-market tracker</span></div>
  </div>
  <div class="header-right">
    <div id="clock">—</div>
    <div class="month-nav">
      <button id="prevMonth">&#8592;</button>
      <div id="monthLabel">—</div>
      <button id="nextMonth">&#8594;</button>
    </div>
  </div>
</header>

<main>
  <!-- TODAY PANEL -->
  <div class="today-panel" id="todayPanel">
    <div>
      <h2>Today's Reports</h2>
      <div class="today-date-label" id="todayDateLabel">—</div>
    </div>
    <div class="summary-chips" id="summaryChips"></div>
    <hr class="divider">
    <div id="todayReports"></div>
  </div>

  <!-- CALENDAR PANEL -->
  <div class="calendar-panel">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>Pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--inprogress)"></div>In Progress</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--done)"></div>Done</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>Delayed / Overdue</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</main>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <h3 id="popupTitle">—</h3>
    <div class="pmeta" id="popupMeta">—</div>
    <div class="status-row" id="popupStatusRow"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<script>
// ─── REPORT DEFINITIONS ───────────────────────────────────────────
const REPORTS = [
  { id: 'egypt_hi_1st',    name: 'Egypt HealthIndex',           type: 'monthly', day: 1,  markets: 'Egypt' },
  { id: 'at_intermediate', name: 'Intermediate AT Report',      type: 'monthly', day: 2,  markets: 'AT' },
  { id: 'at_finalized',    name: 'Finalized AT Report',         type: 'monthly', day: 9,  markets: 'AT' },
  { id: 'sales_data',      name: 'Sales Data Processing',       type: 'monthly', day: 9,  orBefore: true, markets: 'All' },
  { id: 'healthindex_all', name: 'HealthIndex – All 9 Markets', type: 'monthly', day: 12, orBefore: true, markets: '9 Markets' },
  { id: 'reports_alin',    name: 'Reports for Alin',            type: 'monthly', day: 15, markets: 'Alin' },
  { id: 'egypt_hi_fri',    name: 'Egypt HealthIndex',           type: 'weekly',  weekday: 5, markets: 'Egypt' },
  { id: 'wfm_weekly',      name: 'WFM Reports (10 Markets)',    type: 'weekly',  weekday: 2, markets: '10 Markets' },
  { id: 'cz_sk_jo',        name: 'Detailed Report – CZ/SK/JO', type: 'weekly',  weekday: 4, markets: 'Czech, Slovakia, Jordan' },
];

const STATUSES = ['Pending', 'In Progress', 'Done', 'Delayed'];

// ─── GLOBAL TODAY ────────────────────────────────────────────────
const today = new Date();
today.setHours(0, 0, 0, 0);

// ─── DATE UTILS ──────────────────────────────────────────────────
function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// ISO week number — stable across browsers
function isoWeek(d) {
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return `${tmp.getUTCFullYear()}-W${String(Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7)).padStart(2,'0')}`;
}
function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getFirstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }

// Shift a date forward until it lands on Mon–Fri.
// Uses a while-loop so it handles any edge case (e.g. public holiday chains).
function shiftToNextWeekday(date) {
  const d = new Date(date);
  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }
  return d;
}

// ─── STORAGE — safe wrapper (works on GitHub Pages & file://) ─────
// Uses a single JSON object keyed as 'reportradar_data' to avoid
// any per-key issues with some browser security policies.
const STORE_KEY = 'reportradar_data';

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveStore(store) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(store));
  } catch(e) { console.warn('ReportRadar: could not save to localStorage', e); }
}

function storeGet(key) {
  return loadStore()[key] || null;
}

function storeSet(key, value) {
  const store = loadStore();
  store[key] = value;
  saveStore(store);
}

function storeClearPrefix(prefix) {
  const store = loadStore();
  Object.keys(store).forEach(k => { if (k.startsWith(prefix)) delete store[k]; });
  saveStore(store);
}

// ─── MONTHLY AUTO-RESET ───────────────────────────────────────────
// When a new month is detected on page load, all report statuses are wiped.
function runMonthlyReset() {
  const current = monthKey(today);
  const last = storeGet('meta:lastMonth');
  if (last && last !== current) {
    storeClearPrefix('status:');
    console.log(`[ReportRadar] Month changed ${last} → ${current}. Statuses reset.`);
  }
  storeSet('meta:lastMonth', current);
}

// ─── STATUS GET / SET ─────────────────────────────────────────────
function getStatusSmart(report, date) {
  const key = `status:${report.id}:${fmt(date)}`;
  const entry = storeGet(key);
  if (!entry) return 'Pending';

  // Weekly reports: reset if current ISO week differs from stored week
  if (report.type === 'weekly') {
    if (entry.week && entry.week !== isoWeek(date)) return 'Pending';
  }
  return entry.status || 'Pending';
}

function setStatusSmart(report, date, status) {
  const key = `status:${report.id}:${fmt(date)}`;
  const entry = { status };
  if (report.type === 'weekly') entry.week = isoWeek(date);
  storeSet(key, entry);
}

// ─── REPORT SCHEDULE GENERATOR ───────────────────────────────────
// Returns all { report, date, shiftedFrom? } for a given month.
// Monthly reports whose natural date falls on a weekend are moved
// to next Monday; shiftedFrom records the original date for display.
function getMonthReports(y, m) {
  const results = [];
  const dim = getDaysInMonth(y, m);

  REPORTS.forEach(r => {
    if (r.type === 'monthly') {
      const natural = new Date(y, m, Math.min(r.day, dim));
      const shifted = shiftToNextWeekday(natural);
      const wasShifted = shifted.toDateString() !== natural.toDateString();
      results.push({ report: r, date: shifted, shiftedFrom: wasShifted ? natural : null });

    } else if (r.type === 'weekly') {
      for (let day = 1; day <= dim; day++) {
        const natural = new Date(y, m, day);
        if (natural.getDay() === r.weekday) {
          // Weekday reports (Tue/Thu/Fri) should never fall on a weekend,
          // but apply the guard anyway for safety.
          const shifted = shiftToNextWeekday(natural);
          const wasShifted = shifted.toDateString() !== natural.toDateString();
          results.push({ report: r, date: shifted, shiftedFrom: wasShifted ? natural : null });
        }
      }
    }
  });

  return results;
}

function getReportsByDay(y, m) {
  const map = {};
  getMonthReports(y, m).forEach(item => {
    const d = item.date.getDate();
    if (!map[d]) map[d] = [];
    map[d].push(item);
  });
  return map;
}

// ─── NAV STATE ────────────────────────────────────────────────────
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

// ─── RENDER: TODAY PANEL ──────────────────────────────────────────
function renderToday() {
  const label     = document.getElementById('todayDateLabel');
  const container = document.getElementById('todayReports');
  const chips     = document.getElementById('summaryChips');

  label.textContent = today.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  const todayReports = getMonthReports(today.getFullYear(), today.getMonth())
    .filter(({ date }) => date.toDateString() === today.toDateString());

  // Month-wide summary counts
  const allMonth = getMonthReports(today.getFullYear(), today.getMonth());
  let cPending = 0, cInProg = 0, cDone = 0, cDelayed = 0, cOverdue = 0;
  allMonth.forEach(({ report, date }) => {
    const s = getStatusSmart(report, date);
    if (s === 'Pending') {
      cPending++;
      if (date < today) cOverdue++;
    } else if (s === 'In Progress') cInProg++;
    else if (s === 'Done') cDone++;
    else if (s === 'Delayed') cDelayed++;
  });

  chips.innerHTML = `
    ${cOverdue ? `<div class="chip chip-overdue">⚠ ${cOverdue} Overdue</div>` : ''}
    <div class="chip chip-pending">${cPending} Pending</div>
    <div class="chip chip-inprogress">${cInProg} In Progress</div>
    <div class="chip chip-done">${cDone} Done</div>
    ${cDelayed ? `<div class="chip chip-delayed">${cDelayed} Delayed</div>` : ''}
  `;

  if (todayReports.length === 0) {
    container.innerHTML = `<div class="no-reports-today">✓ No reports due today<br><span style="font-size:0.7rem">Check the calendar for upcoming deadlines</span></div>`;
    return;
  }

  container.innerHTML = '';
  todayReports.forEach(({ report, date, shiftedFrom }) => {
    const s = getStatusSmart(report, date);
    const card = document.createElement('div');
    card.className = `today-report-card status-${s.replace(/ /g, '-')}`;
    const shiftNote = shiftedFrom
      ? ` <span style="color:var(--warn);font-size:0.65rem">(shifted from ${shiftedFrom.toLocaleDateString('en-GB',{day:'numeric',month:'short'})})</span>`
      : '';
    card.innerHTML = `
      <div class="report-name">${report.name}${shiftNote}</div>
      <div class="report-meta">${report.markets}${report.orBefore ? ' · Due on or before' : ''}</div>
      <div class="status-row">${STATUSES.map(st =>
        `<button class="status-btn ${s === st ? 'active' : ''}" data-status="${st}"
          onclick="updateStatus('${report.id}','${fmt(date)}','${st}')">${st}</button>`
      ).join('')}</div>
    `;
    container.appendChild(card);
  });
}

// ─── RENDER: CALENDAR ─────────────────────────────────────────────
function renderCalendar() {
  const grid  = document.getElementById('calendarGrid');
  const label = document.getElementById('monthLabel');
  grid.innerHTML = '';

  label.textContent = new Date(viewYear, viewMonth, 1)
    .toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay    = getFirstDayOfMonth(viewYear, viewMonth);
  const dim         = getDaysInMonth(viewYear, viewMonth);
  const reportsByDay = getReportsByDay(viewYear, viewMonth);

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    grid.appendChild(el);
  }

  for (let day = 1; day <= dim; day++) {
    const date    = new Date(viewYear, viewMonth, day);
    const isToday = date.toDateString() === today.toDateString();
    const isPast  = date < today && !isToday;

    const cell = document.createElement('div');
    cell.className = `day-cell${isToday ? ' today-cell' : ''}`;

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = day;
    cell.appendChild(numEl);

    (reportsByDay[day] || []).forEach(({ report, date: rdate, shiftedFrom }) => {
      const s = getStatusSmart(report, rdate);
      const overdue = isPast && s === 'Pending';
      const el = document.createElement('div');
      const cls = overdue ? 'overdue-cal' : `status-${s.replace(/ /g,'.')}`;
      el.className = `cal-report ${cls}`;
      el.textContent = report.name + (shiftedFrom ? ' ↷' : '');
      el.title = `${report.name} — ${s}${shiftedFrom ? ` (moved from ${shiftedFrom.toLocaleDateString('en-GB',{day:'numeric',month:'short'})})` : ''}`;
      el.onclick = () => openPopup(report, rdate, shiftedFrom);
      cell.appendChild(el);
    });

    grid.appendChild(cell);
  }
}

// ─── POPUP ────────────────────────────────────────────────────────
let popupReport = null, popupDate = null;

function openPopup(report, date, shiftedFrom) {
  popupReport = report;
  popupDate   = date;
  const s       = getStatusSmart(report, date);
  const isPast  = date < today;
  const overdue = isPast && s === 'Pending';

  document.getElementById('popupTitle').textContent = report.name;
  const shiftNote = shiftedFrom
    ? ` &nbsp;· <span style="color:var(--warn)">↷ moved from ${shiftedFrom.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} (weekend)</span>`
    : '';
  document.getElementById('popupMeta').innerHTML =
    `<strong>Markets:</strong> ${report.markets} &nbsp;·&nbsp;
     <strong>Due:</strong> ${date.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}
     ${report.orBefore ? ' (or before)' : ''}
     ${shiftNote}
     ${overdue ? ' &nbsp;· <span style="color:var(--danger)">⚠ OVERDUE</span>' : ''}`;

  const row = document.getElementById('popupStatusRow');
  row.innerHTML = STATUSES.map(st =>
    `<button class="status-btn ${s === st ? 'active' : ''}" data-status="${st}"
      onclick="updateStatusPopup('${st}')">${st}</button>`
  ).join('');

  document.getElementById('popupOverlay').classList.add('show');
}

function updateStatusPopup(status) {
  if (!popupReport || !popupDate) return;
  setStatusSmart(popupReport, popupDate, status);
  document.getElementById('popupStatusRow').querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === status);
  });
  renderCalendar();
  renderToday();
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  popupReport = null; popupDate = null;
}

document.getElementById('popupOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

// ─── STATUS UPDATE (today panel buttons) ─────────────────────────
function updateStatus(reportId, dateStr, status) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const report = REPORTS.find(r => r.id === reportId);
  setStatusSmart(report, date, status);
  renderToday();
  renderCalendar();
}

// ─── MONTH NAV ────────────────────────────────────────────────────
document.getElementById('prevMonth').onclick = () => {
  if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
};
document.getElementById('nextMonth').onclick = () => {
  if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
};

// ─── CLOCK ────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) +
    ' · ' + now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── INIT ─────────────────────────────────────────────────────────
runMonthlyReset();
renderToday();
renderCalendar();
</script>
